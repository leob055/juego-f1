<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini F1 Game</title>

<style>
body{
margin:0;
font-family:system-ui,Arial;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
text-align:center;
}

/* INTRO */

#intro{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:30px;
letter-spacing:3px;
animation:introAnim 2.5s forwards;
z-index:10;
}

@keyframes introAnim{
0%{opacity:1}
80%{opacity:1}
100%{opacity:0;visibility:hidden}
}

/* APP */

.container{
max-width:430px;
margin:auto;
padding:20px;
}

.card{
background:#0b1220;
border-radius:18px;
padding:20px;
box-shadow:0 15px 40px rgba(0,0,0,.5);
}

/* INSTRUCCIONES */

.instructions{
background:#020617;
border:1px solid #334155;
border-radius:12px;
padding:12px;
font-size:14px;
margin-bottom:12px;
text-align:left;
line-height:1.4;
}

/* LIGHTS */

.lights{
display:flex;
justify-content:center;
gap:8px;
margin:10px 0;
}

.light{
width:16px;
height:16px;
border-radius:50%;
background:#330000;
}

.light.on{
background:red;
box-shadow:0 0 10px red;
}

/* GAME */

#game{
position:relative;
height:200px;
border-radius:12px;
overflow:hidden;
border:2px solid #334155;
background:#111;
}

.track{
position:absolute;
inset:0;
background:
repeating-linear-gradient(
to right,
#1f1f1f 0px,
#1f1f1f 40px,
#2b2b2b 40px,
#2b2b2b 80px
);
animation:trackMove .8s linear infinite;
}

@keyframes trackMove{
from{transform:translateX(0)}
to{transform:translateX(-80px)}
}

.finish{
position:absolute;
left:8px;
width:16px;
height:100%;
background:repeating-linear-gradient(
45deg,
white,
white 10px,
black 10px,
black 20px
);
}

/* AUTOS */

.car{
position:absolute;
font-size:36px;
transition:left .12s linear;
}

#player{
top:70px;
filter:hue-rotate(-10deg) saturate(2) brightness(1.1);
}

#ai{
top:130px;
}

/* BUTTON */

button{
margin-top:12px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-weight:600;
font-size:16px;
background:#2563eb;
color:white;
}

/* LEADERBOARD */

.leaderboard{
margin-top:15px;
text-align:left;
font-size:14px;
opacity:.9;
}

/* FINAL SCREEN */

#finalScreen{
display:none;
position:fixed;
inset:0;
background:linear-gradient(135deg,#ff4fa3,#ff7ac6,#ffa3d1);
justify-content:center;
align-items:center;
padding:30px;
text-align:center;
overflow:hidden;
}

/* BANDERAS */

.flags{
position:absolute;
inset:0;
pointer-events:none;
}

.flag{
position:absolute;
font-size:40px;
animation:flagWave 1s infinite ease-in-out;
}

.flag.left{left:20px;top:20px}
.flag.right{right:20px;top:20px}
.flag.bottomLeft{left:20px;bottom:20px}
.flag.bottomRight{right:20px;bottom:20px}

@keyframes flagWave{
0%{transform:rotate(-10deg)}
50%{transform:rotate(10deg)}
100%{transform:rotate(-10deg)}
}

.finalCard{
background:white;
color:#111;
padding:30px;
border-radius:20px;
max-width:320px;
box-shadow:0 20px 60px rgba(0,0,0,.4);
animation:pop .6s ease;
}

@keyframes pop{
from{transform:scale(.7);opacity:0}
to{transform:scale(1);opacity:1}
}

.finalTitle{
font-size:26px;
margin-bottom:10px;
}

.finalText{
font-size:18px;
line-height:1.4;
}
</style>
</head>

<body>

<div id="intro">
🏁 FORMULA 1
<div style="font-size:14px;opacity:.6;margin-top:10px">
Race Weekend
</div>
</div>

<div class="container">
<div class="card">

<h2>🏎️ Carrera contra mí</h2>

<div class="instructions" id="instructions">
<b>Cómo jugar:</b><br>
1️⃣ Presiona <b>Iniciar carrera</b><br>
2️⃣ Espera a que se apaguen las luces 🔴<br>
3️⃣ Toca la pista muchas veces para acelerar<br>
4️⃣ Gana la carrera antes que yo 😏
</div>

<div class="lights">
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
</div>

<div id="game">
<div class="track"></div>

<div id="player" class="car">🏎️</div>
<div id="ai" class="car">🏎️</div>

<div class="finish"></div>
</div>

<button onclick="startRace()">Iniciar carrera</button>

<div class="leaderboard">
<b>Mejores tiempos</b>
<div id="times"></div>
</div>

</div>
</div>

<div id="finalScreen">

<div class="flags">
<div class="flag left">🏁</div>
<div class="flag right">🏁</div>
<div class="flag bottomLeft">🏁</div>
<div class="flag bottomRight">🏁</div>
</div>

<div class="finalCard">
<div class="finalTitle">🏁 Carrera terminada</div>
<div class="finalText" id="finalMessage"></div>
</div>

</div>

<script>
const nombre="Fernanda";

let playerPos,aiPos;
let running=false;
let startTime;

const width=380;
const finish=20;

const player=document.getElementById("player");
const ai=document.getElementById("ai");

/* ENGINE SOUND */

let ctx;
function engine(){
if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)();
const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.type="sawtooth";
osc.frequency.value=120+Math.random()*120;

gain.gain.value=0.06;

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();
osc.stop(ctx.currentTime+0.07);
}

/* START */

function startRace(){
document.getElementById("instructions").style.display="none";
startLights();
}

function startLights(){
const lights=document.querySelectorAll(".light");
let i=0;

const interval=setInterval(()=>{
lights[i].classList.add("on");
i++;

if(i===lights.length){
clearInterval(interval);
setTimeout(beginRace,600);
}
},400);
}

function beginRace(){
document.querySelectorAll(".light").forEach(l=>l.classList.remove("on"));

playerPos=width;
aiPos=width;

player.style.left=playerPos+"px";
ai.style.left=aiPos+"px";

running=true;
startTime=Date.now();

aiMove();
}

/* MOVEMENT */

document.addEventListener("touchstart",accelerate);
document.addEventListener("click",accelerate);

function accelerate(){
if(!running) return;

playerPos-=20;
engine();
player.style.left=playerPos+"px";
checkWin();
}

function aiMove(){
const aiInterval=setInterval(()=>{
if(!running){clearInterval(aiInterval);return;}

aiPos -= 22 + Math.random()*12;
ai.style.left=aiPos+"px";
checkWin();

},180);
}

/* WIN */

function checkWin(){
if(playerPos<=finish) endGame(true);
if(aiPos<=finish) endGame(false);
}

function endGame(win){
running=false;

let time=((Date.now()-startTime)/1000).toFixed(2);
saveTime(time);

const screen=document.getElementById("finalScreen");
screen.style.display="flex";

const msg=document.getElementById("finalMessage");

if(win){
msg.innerHTML=
"<b>"+nombre+"</b>, ganaste la carrera 💗<br><br>Ahora me debes ir a ver una carrera de F1 conmigo 🏎️";
  <img src='img/f1-invitacion.png' style='width:90%;max-width:260px;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.3);margin-top:12px;'>";
}else{
msg.innerHTML=
"te gane 😜<br><br>Me debes una invitacion para ver la F1 conmigo 💗 jsjjsjs";
  <img src='img/f1-invitacion.png' style='width:90%;max-width:260px;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.3);margin-top:12px;'>";
}

loadTimes();
}

/* LEADERBOARD */

function saveTime(t){
let times=JSON.parse(localStorage.getItem("f1times")||"[]");
times.push(t);
times.sort((a,b)=>a-b);
times=times.slice(0,5);
localStorage.setItem("f1times",JSON.stringify(times));
}

function loadTimes(){
let times=JSON.parse(localStorage.getItem("f1times")||"[]");
document.getElementById("times").innerHTML=
times.map(t=>"🏁 "+t+"s").join("<br>");
}

loadTimes();
</script>

</body>
</html>
