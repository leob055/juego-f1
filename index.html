<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrera F1</title>

<style>
body{
  margin:0;
  font-family: system-ui, -apple-system, Arial;
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
  text-align:center;
}

.container{
  max-width:430px;
  margin:auto;
  padding:20px;
}

.card{
  background:#0b1220;
  border-radius:18px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h1{
  margin:10px 0 5px;
  font-size:24px;
}

.subtitle{
  opacity:.7;
  font-size:14px;
  margin-bottom:10px;
}

/* SEMAFORO F1 */

.lights{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px 0 15px;
}

.light{
  width:18px;
  height:18px;
  border-radius:50%;
  background:#330000;
  box-shadow:0 0 10px rgba(0,0,0,0.6) inset;
}

.light.on{
  background:red;
  box-shadow:0 0 10px red;
}

/* GAME */

#game{
  position:relative;
  height:200px;
  border-radius:12px;
  overflow:hidden;
  border:2px solid #334155;
  background:#111;
}

/* EFECTO VELOCIDAD */

.track{
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(
      to right,
      #222 0px,
      #222 40px,
      #2f2f2f 40px,
      #2f2f2f 80px
    );
  animation: moveTrack 1s linear infinite;
  opacity:.6;
}

@keyframes moveTrack{
  from{ transform:translateX(0); }
  to{ transform:translateX(-80px); }
}

.finish{
  position:absolute;
  left:8px;
  width:16px;
  height:100%;
  background: repeating-linear-gradient(
    45deg,
    white,
    white 10px,
    black 10px,
    black 20px
  );
}

/* AUTOS */

.car{
  position:absolute;
  font-size:34px;
  transition:left .15s linear;
}

#player{ top:70px; }
#ai{ top:130px; }

/* COLORES EQUIPOS */

.redbull{
  filter:hue-rotate(200deg) saturate(1.3);
}

.ferrari{
  filter:hue-rotate(-20deg) saturate(1.5);
}

/* BOTON */

button{
  margin-top:15px;
  width:100%;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-weight:600;
}

/* FINAL SCREEN */

#finalScreen{
  display:none;
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#ff4fa3,#ff7ac6);
  color:white;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:26px;
  padding:30px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>🏁 Carrera de F1</h1>
<div class="subtitle">Toca la pantalla para acelerar</div>

<div class="lights" id="lights">
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
</div>

<div id="game">
<div class="track"></div>

<div id="player" class="car redbull">🏎️</div>
<div id="ai" class="car ferrari">🏎️</div>

<div class="finish"></div>
</div>

<button onclick="startRace()">Iniciar carrera</button>

</div>
</div>

<div id="finalScreen"></div>

<script>
const nombre = "Valeria";

let playerPos;
let aiPos;
let gameRunning=false;
let finish=20;
const width=380;

const player=document.getElementById("player");
const ai=document.getElementById("ai");

function startRace(){
  resetLights();
  startLightsSequence();
}

function resetLights(){
  document.querySelectorAll(".light").forEach(l=>l.classList.remove("on"));
}

function startLightsSequence(){
  const lights=document.querySelectorAll(".light");
  let i=0;

  const interval=setInterval(()=>{
    lights[i].classList.add("on");
    i++;

    if(i===lights.length){
      clearInterval(interval);
      setTimeout(startRaceNow,700);
    }
  },400);
}

function startRaceNow(){
  document.querySelectorAll(".light").forEach(l=>l.classList.remove("on"));

  playerPos=width;
  aiPos=width;

  player.style.left=playerPos+"px";
  ai.style.left=aiPos+"px";

  gameRunning=true;
  aiMove();
}

document.addEventListener("touchstart", accelerate);
document.addEventListener("click", accelerate);

function accelerate(){
  if(!gameRunning) return;

  playerPos-=20;
  player.style.left=playerPos+"px";
  checkWin();
}

function aiMove(){
  const aiInterval=setInterval(()=>{
    if(!gameRunning){
      clearInterval(aiInterval);
      return;
    }

    aiPos-=Math.random()*16;
    ai.style.left=aiPos+"px";
    checkWin();
  },180);
}

function checkWin(){
  if(playerPos<=finish){
    endGame(true);
  }
  if(aiPos<=finish){
    endGame(false);
  }
}

function endGame(win){
  gameRunning=false;

  const screen=document.getElementById("finalScreen");
  screen.style.display="flex";

  if(win){
    screen.innerHTML=
    "🏁 "+nombre+" ganaste mi carrera favorita.<br><br>¿Salimos a ver F1 juntos? 💗";
  }else{
    screen.innerHTML=
    nombre+" casi ganamos 😅<br><br>pero igual quiero invitarte a ver F1 conmigo 💗";
  }
}
</script>

</body>
</html>
