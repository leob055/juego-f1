<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrera F1</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  text-align:center;
  color:white;
  background:#111;
}

h1{
  margin-top:15px;
}

#game{
  position:relative;
  width:95%;
  max-width:420px;
  height:220px;
  margin:20px auto;
  border-radius:12px;
  overflow:hidden;
  border:4px solid white;
  background-image:url("https://upload.wikimedia.org/wikipedia/commons/7/7a/Start_grid_Silverstone_2014.jpg");
  background-size:cover;
  background-position:center;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
}

.car{
  position:absolute;
  font-size:34px;
  transition:left 0.15s linear;
}

#player{
  top:80px;
}

#ai{
  top:140px;
}

#finish{
  position:absolute;
  left:10px;
  width:14px;
  height:100%;
  background: repeating-linear-gradient(
    45deg,
    white,
    white 10px,
    black 10px,
    black 20px
  );
}

#countdown{
  font-size:40px;
  font-weight:bold;
}

button{
  padding:14px 24px;
  font-size:18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#finalScreen{
  display:none;
  position:fixed;
  inset:0;
  background:#ff4fa3;
  color:white;
  font-size:28px;
  font-weight:bold;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:30px;
}
</style>
</head>

<body>

<h1>🏁 Carrera de F1</h1>
<div id="countdown">Presiona iniciar</div>

<div id="game">
  <div class="overlay"></div>

  <div id="player" class="car">🏎️</div>
  <div id="ai" class="car">🏎️</div>

  <div id="finish"></div>
</div>

<button onclick="startRace()">Iniciar carrera</button>

<div id="finalScreen"></div>

<script>
const nombre = "Valeria";

let gameRunning = false;
let playerPos;
let aiPos;
let finish = 20;

let engineContext;

const player = document.getElementById("player");
const ai = document.getElementById("ai");
const gameWidth = 380;

function engineSound(){
  if(!engineContext){
    engineContext = new (window.AudioContext || window.webkitAudioContext)();
  }

  const osc = engineContext.createOscillator();
  const gain = engineContext.createGain();

  osc.type = "sawtooth";
  osc.frequency.value = 140 + Math.random()*100;

  gain.gain.value = 0.05;

  osc.connect(gain);
  gain.connect(engineContext.destination);

  osc.start();
  osc.stop(engineContext.currentTime + 0.08);
}

function startRace(){
  playerPos = gameWidth;
  aiPos = gameWidth;

  player.style.left = playerPos + "px";
  ai.style.left = aiPos + "px";

  let count = 3;
  document.getElementById("countdown").innerText = count;

  const interval = setInterval(()=>{
    count--;
    if(count > 0){
      document.getElementById("countdown").innerText = count;
    } else if(count === 0){
      document.getElementById("countdown").innerText = "GO!";
    } else {
      clearInterval(interval);
      document.getElementById("countdown").innerText = "Toca la pantalla para acelerar";
      gameRunning = true;
      aiMove();
    }
  },1000);
}

document.addEventListener("touchstart", accelerate);
document.addEventListener("click", accelerate);

function accelerate(){
  if(!gameRunning) return;

  playerPos -= 18;
  engineSound();
  player.style.left = playerPos + "px";
  checkWin();
}

function aiMove(){
  const aiInterval = setInterval(()=>{
    if(!gameRunning){
      clearInterval(aiInterval);
      return;
    }

    aiPos -= Math.random()*14;
    ai.style.left = aiPos + "px";
    checkWin();
  },200);
}

function checkWin(){
  if(playerPos <= finish){
    endGame(true);
  }

  if(aiPos <= finish){
    endGame(false);
  }
}

function endGame(playerWin){
  gameRunning = false;

  const screen = document.getElementById("finalScreen");
  screen.style.display = "flex";

  if(playerWin){
    screen.innerHTML =
    "🏁 "+nombre+" ganaste mi carrera favorita.<br><br>¿Salimos a ver una carrera de F1 juntos? 💗";
  } else {
    screen.innerHTML =
    nombre+" casi ganamos 😅<br><br>pero igual quiero invitarte a ver F1 conmigo 💗";
  }
}
</script>

</body>
</html>
