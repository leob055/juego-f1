<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Carrera F1</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #111;
  color: white;
}

h1 {
  margin-top: 10px;
}

#game {
  position: relative;
  width: 90%;
  max-width: 400px;
  height: 200px;
  margin: 20px auto;
  background: #222;
  border: 3px solid white;
  overflow: hidden;
}

#car {
  position: absolute;
  left: 10px;
  top: 80px;
  font-size: 40px;
}

#finish {
  position: absolute;
  right: 0;
  top: 0;
  width: 10px;
  height: 100%;
  background: white;
}

button {
  padding: 15px 25px;
  font-size: 18px;
  margin-top: 10px;
}
</style>
</head>
<body>

<h1>🏎️ Carrera Especial</h1>
<p>Toca el botón para acelerar</p>

<div id="game">
  <div id="car">🏎️</div>
  <div id="finish"></div>
</div>

<button onclick="accelerate()">Acelerar</button>

<p id="message"></p>

<script>
let position = 10;
const finish = 340;

function accelerate() {
  position += 20;
  document.getElementById("car").style.left = position + "px";

  if (position >= finish) {
    document.getElementById("message").innerText =
      "Ganaste la carrera 🏁 Ahora te invito a ver una carrera de F1 conmigo 😉";
  }
}
</script>

</body>
</html>
